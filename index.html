        scoutBosnia: "\"Les Dragons\" ont choqué le monde lors des playoffs UEFA en éliminant l'Italie. Construit autour d'un noyau de vétérans solides et d'une nouvelle vague de talents basés en Bundesliga, ils privilégient un 4-2-3-1 compact qui repose sur une finition clinique sur coups de pied arrêtés.",
        outlookBosnia: "Placé dans le groupe B avec le Canada, le Qatar et la Suisse. Ils sont les grands favoris pour se qualifier aux côtés des Suisses dans ce qui est considéré comme un groupe très équilibré.",
        scoutCapeVerde: "Faisant leurs débuts historiques en Coupe du Monde, les \"Requins Bleus\" sont des caméléons tactiques. Menés par l'ailier vétéran Ryan Mendes, ils jouent avec un style audacieux et plein d'énergie. Leur force réside dans une diaspora mondiale de talents évoluant dans les meilleures divisions européennes.",
        outlookCapeVerde: "Dans le groupe H avec l'Espagne, l'Arabie Saoudite et l'Uruguay. Bien que l'Espagne et l'Uruguay soient des géants, l'historique de Cape Verde en tant que \"tueur de géants\" en CAN en fait un outsider dangereux pour une place de 3ème qualifié.",
        scoutCuracao: "La fierté des Caraïbes, Curacao utilise une forte influence néerlandaise dans leur configuration tactique. Ils se concentrent sur les transitions rapides et le jeu technique au milieu de terrain. De nombreux membres de l'équipe évoluent en Eredivisie, apportant un haut niveau de discipline tactique.",
        outlookCuracao: "Dans le groupe E avec l'Allemagne, la Côte d'Ivoire et l'Équateur. C'est un candidat au \"groupe de la mort\" ; survivre nécessitera un résultat contre l'Équateur lors de leur deuxième match.",
        scoutCzechia: "Après une victoire épuisante en playoffs contre le Danemark, les Tchèques entrent en 2026 avec une équipe physiquement dominante. Ils sont des maîtres du \"pressing élevé\" et possèdent l'une des menaces aériennes les plus dangereuses du tournoi.",
        outlookCzechia: "Placé dans le groupe A avec les hôtes Mexique, l'Afrique du Sud et la Corée du Sud. Leur match contre le Mexique à l'Azteca sera l'un des matchs les plus regardés de la première semaine.",
        scoutDRCongo: "Les \"Léopards\" ont décroché le dernier billet pour la Coupe du Monde en battant la Jamaïque en playoff intercontinental. Ils recrutent actuellement des bi-nationaux de grande valeur comme le gardien Obed Nkambadio pour renforcer une équipe déjà riche d'expérience en Ligue 1 et Premier League.",
        outlookDRCongo: "Dans le groupe K avec le Portugal, l'Ouzbékistan et la Colombie. Leur vitesse explosive sur les ailes fait d'eux un cauchemar pour la défense portugaise vieillissante.",
        scoutGhana: "Les \"Black Stars\" reviennent avec une équipe jeune et éclair. Ils ont abandonné le style défensif de 2022 pour adopter une philosophie chaotique et prolifique menée par une nouvelle génération d'attaquants d'Ajax et de Premier League.",
        outlookGhana: "Dans le groupe L contre l'Angleterre, la Croatie et le Panama. On s'attend à ce qu'ils luttent contre la Croatie pour la deuxième place qualificative automatique.",
        scoutHaiti: "Faisant leur première apparition depuis 1974, \"Les Grenadiers\" sont l'histoire ultime de résilience. Menés par le meilleur buteur de tous les temps Duckens Nazon, ils jouent un style rugueux et défensif conçu pour frustrer les adversaires d'élite.",
        outlookHaiti: "Un tirage brutal dans le groupe C aux côtés du Brésil, du Maroc et de l'Écosse. Leur objectif sera de décrocher un premier point historique en Coupe du Monde contre l'Écosse à Boston.",
        scoutIraq: "\"Les Lions de Mésopotamie\" se sont qualifiés pour la première fois en 40 ans après une victoire dramatique contre la Bolivie. Ils jouent avec une intensité émotionnelle immense et une ligne défensive à 5 hommes notoirement difficile à percer.",
        outlookIraq: "Dans le groupe I avec la France, le Sénégal et la Norvège. Compte tenu du contexte de guerre chez eux, ils sont les favoris sentimentaux du tournoi, bien que se qualifier devant la France et le Sénégal soit une tâche monumentale.",
        scoutIvoryCoast: "Les \"Éléphants\" sont sans doute la meilleure équipe africaine du tournoi. Ils disposent d'un milieu de terrain de classe mondiale qui rivalise avec les géants européens. Ils préfèrent un 4-3-3 basé sur la possession qui use les équipes sur 90 minutes.",
        outlookIvoryCoast: "Dans le groupe E (Allemagne, Curacao, Équateur). On s'attend largement à ce qu'ils atteignent les huitièmes de finale et ils sont considérés par de nombreux analystes comme une \"sleeper pick\" pour les quarts de finale.",
        scoutJordan: "Faisant leurs débuts, la Jordanie s'appuie sur une mentalité collective de \"guerrier\". Ils manquent de noms de superstars mais ont le meilleur bilan déf des qualifications asiatiques. Ils excellent dans les situations de bloc bas et les contre-attaques.",
        outlookJordan: "Dans le groupe J avec l'Argentine, l'Algérie et l'Autriche. Affronter l'Argentine de Messi pour leurs débuts est un tirage \"de rêve\", mais leur chemin réaliste vers l'avant dépend d'un résultat contre l'Autriche.",
        scoutNewZealand: "Les \"All Whites\" ont dominé les qualifications océaniennes. Ils ont évolué d'une équipe de \"longs ballons\" vers une formation moderne qui utilise la largeur. Leur capitaine apporte une présence vitale en Premier League au cœur de la défense.",
        outlookNewZealand: "Dans le groupe G avec la Belgique, l'Égypte et l'Iran. C'est l'un des groupes les plus ouverts ; les Kiwis ont une chance réelle d'atteindre les phases éliminatoires pour la première fois de leur histoire.",
        scoutQatar: "Plus que de simples hôtes, le Qatar est devenu une puissance continentale disciplinée. Leur équipe joue ensemble depuis des années, résultant en une chimie \"de club\" rare en football international.",
        outlookQatar: "Dans le groupe B avec le Canada, la Suisse et la Bosnie. Leur familiarité avec le jeu de tournoi sous haute pression leur donne un avantage dans un groupe très serré.",
        scoutScotland: "Le Tartan Army arrive avec son équipe la plus talentueuse depuis 30 ans. Ils sont construits autour d'une attitude \"jamais vaincu\" et d'un milieu de terrain qui excelle dans la rétention du ballon sous pression.",
        outlookScotland: "Dans le groupe C avec le Brésil, le Maroc et Haïti. Leur match contre le Maroc à Atlanta décidera probablement qui prend la deuxième place derrière le Brésil.",
        scoutSouthAfrica: "\"Bafana Bafana\" sont de retour avec une équipe presque entièrement basée dans leur championnat national, leur donnant une cohésion tactique unique. Ils jouent un jeu de passes courtes plein de flair connu sous le nom de \"Shooshoe.\"",
        outlookSouthAfrica: "Dans le groupe A avec le Mexique, la Corée du Sud et la Tchéquie. Ils affrontent un match d'ouverture difficile contre les Tchèques à Atlanta.",
        scoutSweden: "Après avoir manqué 2022, la Suède est revenue via les playoffs. Ils sont passés à un 4-4-2 très offensif, abandonnant leurs racines historiquement défensives pour utiliser leurs jeunes attaquants de classe mondiale.",

        scoutUzbekistan: "Les \"Loups Blancs\" sont la puissance montante de l'Asie. Techniquement doués et extrêmement rapides en contre-attaque, ils sont menés par une ligne d'attaque prolifique dans les championnats italien et russe.",
        outlookUzbekistan: "Dans le groupe K avec le Portugal, la RD Congo et la Colombie. De nombreux experts les considèrent comme la \"Nouvelle Corée du Sud\" --- une équipe capable d'une course surprenante jusqu'aux phases finales.",

        scoutDRCongo: "Die \"Leoparden\" sicherten sich das letzte Ticket zur WM, indem sie Jamaika im interkontinentalen Playoff besiegten. Derzeit werben sie um hochwertige Dualstaatsbürger wie Torwart Obed Nkambadio, um einen Kader zu verstärken, der bereits reich an Ligue-1- und Premier-League-Erfahrung ist.",
        outlookDRCongo: "In Gruppe K mit Portugal, Usbekistan und Kolumbien. Ihre explosive Geschwindigkeit an den Flügeln macht sie zum Albtraum für die alternde portugiesische Abwehr.",
        scoutGhana: "Die \"Black Stars\" kehren mit einer jungen, blitzschnellen Mannschaft zurück. Sie haben den defensiven Stil von 2022 hinter sich gelassen und eine chaotische, torreiche Philosophie übernommen, angeführt von einer neuen Generation von Ajax- und Premier-League-Angreifern.",
        outlookGhana: "In Gruppe L gegen England, Kroatien und Panama. Man erwartet, dass sie gegen Kroatien um den zweiten automatischen Qualifikationsplatz kämpfen.",
        scoutHaiti: "Bei ihrem ersten Auftritt seit 1974 sind \"Les Grenadiers\" die ultimative Geschichte der Widerstandsfähigkeit. Angeführt von Duckens Nazon, dem besten Torschützen aller Zeiten, spielen sie einen robusten, defensiven Stil, der darauf ausgelegt ist, Elitegegner zu frustrieren.",
        outlookHaiti: "Eine brutale Auslosung in Gruppe C zusammen mit Brasilien, Marokko und Schottland. Ihr Ziel wird es sein, einen historischen ersten WM-Punkt gegen Schottland in Boston zu sichern.",
        scoutIraq: "\"Die Löwen von Mesopotamien\" qualifizierten sich zum ersten Mal seit 40 Jahren nach einem dramatischen Sieg über Bolivien. Sie spielen mit immenser emotionaler Intensität und einer disziplinierten 5-Mann-Abwehrreihe, die notoriously schwer zu durchbrechen ist.",
        outlookIraq: "In Gruppe I mit Frankreich, Senegal und Norwegen. Angesichts des Kriegshintergrunds zu Hause sind sie die sentimentalen Favoriten des Turniers, obwohl das Weiterkommen hinter Frankreich und Senegal eine monumentale Aufgabe ist.",
        scoutIvoryCoast: "Die \"Elefanten\" sind wohl die stärkste afrikanische Mannschaft im Turnier. Sie verfügen über eine Weltklasse-Mittelfeldreihe, die mit europäischen Giganten mithalten kann. Sie bevorzugen ein besitzbasiertes 4-3-3, das Teams über 90 Minuten ermüdet.",
        outlookIvoryCoast: "Teil von Gruppe E (Deutschland, Curacao, Ecuador). Man erwartet sie weitgehend in der Runde der letzten 16, und viele Analysten sehen sie als \"Viertelfinale-Überraschung\".",
        scoutJordan: "Bei ihrem Debüt verlässt sich Jordanien auf eine kollektive \"Krieger\"-Mentalität. Ihnen fehlen Superstar-Namen, aber sie haben die beste Defensivbilanz in den asiatischen Qualifikationen. Sie gedeihen in Situationen mit tiefem Block und Konterangriffen.",
        outlookJordan: "In Gruppe J mit Argentinien, Algerien und Österreich. Die Begegnung mit Messis Argentinien bei ihrem Debüt ist eine \"Traum\"-Auslosung, aber ihr realistischer Weg nach vorne hängt von einem Ergebnis gegen Österreich ab.",
        scoutNewZealand: "Die \"All Whites\" dominierten die ozeanischen Qualifikationen. Sie haben sich von einem \"Langball\"-Team zu einer modernen Mannschaft entwickelt, die die Breite nutzt. Ihr Kapitän bietet eine vitale Premier-League-Präsenz im Herzen der Abwehr.",
        outlookNewZealand: "In Gruppe G mit Belgien, Ägypten und Iran. Dies ist eine der offeneren Gruppen; die Kiwis haben eine echte Chance, zum ersten Mal in der Geschichte die K.-o.-Runde zu erreichen.",
        scoutQatar: "Nicht mehr nur Gastgeber, hat sich Katar zu einer disziplinierten Kontinentalmacht entwickelt. Ihre Mannschaft spielt seit Jahren zusammen, was zu einer seltenen \"vereinsähnlichen\" Chemie im internationalen Fußball führt.",
        outlookQatar: "In Gruppe B mit Kanada, der Schweiz und Bosnien. Ihre Vertrautheit mit Spielen unter Hochdruck gibt ihnen einen Vorteil in einer sehr engen Gruppe.",
        scoutScotland: "Die Tartan Army kommt mit ihrem talentiertesten Kader seit 30 Jahren an. Sie sind auf eine \"never say die\"-Einstellung und ein Mittelfeld aufgebaut, das sich unter Druck hervorragend im Ballbehalt auszeichnet.",
        outlookScotland: "In Gruppe C mit Brasilien, Marokko und Haiti. Ihr Spiel gegen Marokko in Atlanta wird wahrscheinlich entscheiden, wer den zweiten Platz hinter Brasilien belegt.",
        scoutSouthAfrica: "\"Bafana Bafana\" sind mit einer fast vollständig im heimischen Ligasystem basierenden Mannschaft zurück, was ihnen eine einzigartige taktische Kohäsion verleiht. Sie spielen ein flair-betontes, kurzes Passspiel, das als \"Shooshoe\" bekannt ist.",
        outlookSouthAfrica: "Teil von Gruppe A mit Mexiko, Südkorea und Tschechien. Sie haben ein schwieriges Eröffnungsspiel gegen die Tschechen in Atlanta.",
        scoutSweden: "Nachdem sie 2022 verpasst hatten, kehrte Schweden über die Playoffs zurück. Sie sind zu einem hochoffensiven 4-4-2 übergegangen, weg von ihren historisch defensiven Wurzeln, um ihre Weltklasse-Jungstürmer zu nutzen.",
        outlookSweden: "In Gruppe F mit den Niederlanden, Japan und Tunesien. Dies ist wohl die technischste Gruppe des Turniers; Schwedens Physis wird ihr Schlüsselvorteil sein.",
        scoutUzbekistan: "Die \"Weißen Wölfe\" sind die aufsteigende Macht Asiens. Technisch begabt und extrem schnell im Konter, werden sie von einer Sturmlinie angeführt, die in den italienischen und russischen Ligen treffsicher war.",
        outlookUzbekistan: "In Gruppe K mit Portugal, der DR Kongo und Kolumbien. Viele Experten betrachten sie als das \"neue Südkorea\" --- eine Mannschaft, die zu einem überraschenden tiefen Lauf in die späten Phasen fähig ist.",

    const LanguageContext = createContext();

    const LanguageProvider = ({ children }) => {
      const [language, setLanguage] = useState(() => {
        const saved = localStorage.getItem('fansHub2026Language');
        return saved || 'en';
      });

      useEffect(() => {
        localStorage.setItem('fansHub2026Language', language);
      }, [language]);

      const t = (key) => {
        return translations[language]?.[key] || translations['en'][key] || key;
      };

      return (
        <LanguageContext.Provider value={{ language, setLanguage, t }}>
          {children}
        </LanguageContext.Provider>
      );
    };

    const useTranslation = () => {
      const context = useContext(LanguageContext);
      if (!context) {
        throw new Error('useTranslation must be used within LanguageProvider');
      }
      return context;
    };

    const LanguageSelector = () => {
      const { language, setLanguage } = useTranslation();
      const [isOpen, setIsOpen] = useState(false);

      const languages = [
        { code: 'en', name: 'English', flag: '🇬🇧' },
        { code: 'fr', name: 'Français', flag: '🇫🇷' },
        { code: 'de', name: 'Deutsch', flag: '🇩🇪' },
        { code: 'es', name: 'Español', flag: '🇪🇸' },
      ];

      const currentLang = languages.find(l => l.code === language);

      const handleLanguageChange = (langCode) => {
        setLanguage(langCode);
        setIsOpen(false);
      };

      return (
        <div className="relative">
          <button
            onClick={() => setIsOpen(!isOpen)}
            className="flex items-center gap-2 px-3 py-2 bg-white/5 hover:bg-white/10 rounded-xl border border-white/10 transition-colors"
          >
            <span className="text-lg">{currentLang?.flag}</span>
            <span className="text-xs font-bold text-white uppercase hidden sm:inline">
              {currentLang?.code}
            </span>
            <Icon name="chevron-down" className="w-3 h-3 text-slate-400" />
          </button>

          {isOpen && (
            <>
              <div
                className="fixed inset-0 z-40"
                onClick={() => setIsOpen(false)}
              />
              <div className="absolute right-0 mt-2 w-48 bg-[#11141B] rounded-xl border border-white/10 shadow-2xl z-50 overflow-hidden">
                {languages.map((lang) => (
                  <button
                    key={lang.code}
                    onClick={() => handleLanguageChange(lang.code)}
                    className={`w-full flex items-center gap-3 px-4 py-3 text-left transition-colors ${language === lang.code
                      ? 'bg-blue-600 text-white'
                      : 'text-slate-300 hover:bg-white/5'
                      }`}
                  >
                    <span className="text-xl">{lang.flag}</span>
                    <span className="text-sm font-semibold">{lang.name}</span>
                    {language === lang.code && (
                      <Icon name="check" className="w-4 h-4 ml-auto" />
                    )}
                  </button>
                ))}
              </div>
            </>
          )}
        </div>
      );
    };

    function useCountdown(targetDate) {
      const [timeLeft, setTimeLeft] = useState({
        days: 0,
        hrs: 0,
        mins: 0,
        secs: 0,
      });

      useEffect(() => {
        const update = () => {
          const now = new Date().getTime();
          const dist = targetDate - now;
          if (dist < 0) return;
          setTimeLeft({
            days: Math.floor(dist / (1000 * 60 * 60 * 24)),
            hrs: Math.floor(
              (dist % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60),
            ),
            mins: Math.floor((dist % (1000 * 60 * 60)) / (1000 * 60)),
            secs: Math.floor((dist % (1000 * 60)) / 1000),
          });
        };
        update();
        const timer = setInterval(update, 1000);
        return () => clearInterval(timer);
      }, [targetDate]);

      return timeLeft;
    }

                        ))}
                      </div>
                    </div>
                  </div>
                </div>

                {VENUES.map((venue) => (
                  <div
                    key={venue.name}
                    className="bg-[#11141B] rounded-[2.5rem] border border-white/5 overflow-hidden shadow-2xl"
                  >
                    <div className="p-8 bg-gradient-to-br from-blue-600/20 to-transparent border-b border-white/5">
                      <div className="flex justify-between items-start mb-4">
                        <div>
                          <h3 className="text-3xl font-black text-white uppercase italic leading-none mb-2">
                            {venue.name}
                          </h3>
                          <div className="flex items-center gap-2 text-blue-400">
                            <Icon name="map-pin" className="w-4 h-4" />
                            <span className="text-[10px] font-black uppercase tracking-widest">
                              {venue.city}, {venue.country}
                            </span>
                          </div>
                        </div>
                        <div className="bg-white/5 px-4 py-2 rounded-2xl flex items-center gap-2 border border-white/10">
                          <Icon
                            name="users"
                            className="w-4 h-4 text-slate-400"
                          />
                          <span className="text-lg font-black text-white">
                            {venue.capacity}
                          </span>
                        </div>
                      </div>
                      <p className="text-xs text-slate-400 font-mono italic">
                        {venue.address}
                      </p>
                    </div>
                    <div className="p-8 space-y-8">
                      <div className="space-y-4">
                        <div className="flex items-center gap-2 text-amber-500">
                          <Icon name="bus" className="w-5 h-5" />
                          <h4 className="text-xs font-black uppercase tracking-[0.2em]">
                            {t('travel')}:
                          </h4>
                        </div>
                        <div className="bg-black/40 p-5 rounded-2xl border border-white/5 italic text-sm text-slate-300">
                          {t(venue.travelKey)}
                        </div>
                      </div>
                      {venue.touristInfoKey && (
                        <div className="space-y-4">
                          <div className="flex items-center gap-2 text-emerald-500">
                            <Icon name="camera" className="w-5 h-5" />
                            <h4 className="text-xs font-black uppercase tracking-[0.2em]">
                              {t('touristHotspot')}
                            </h4>
                          </div>
                          <div className="bg-emerald-500/5 p-5 rounded-2xl border border-emerald-500/10 italic text-sm text-slate-300">
                            {t(venue.touristInfoKey)}
                          </div>
                        </div>
                      )}
                      <div className="grid grid-cols-2 gap-4">
                        <a
                          href={venue.map}
                          target="_blank"
                          className="flex items-center justify-center gap-3 py-4 bg-blue-600 rounded-2xl text-white font-black uppercase tracking-widest text-[10px]"
                        >
                          <Icon name="navigation" className="w-4 h-4" /> {t('openNavigation')}
                        </a>
                        <a
                          href={venue.office}
                          target="_blank"
                          className="flex items-center justify-center gap-3 py-4 bg-white/5 rounded-2xl text-slate-300 font-black uppercase tracking-widest text-[10px] border border-white/10"
                        >
                          <Icon name="info" className="w-4 h-4" /> {t('cityResources')}
                        </a>
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            )}

            {view === "travelInfo" && (
              <div className="max-w-2xl mx-auto space-y-8 pt-12 pb-4">
                <h2 className="text-3xl font-black text-white italic uppercase">
                  {t('travelInfoTitle')}
                </h2>

                <div className="bg-blue-600/10 border border-blue-500/20 p-6 rounded-3xl relative overflow-hidden">
                  <Icon
                    name="plane"
                    className="absolute -right-4 -bottom-4 w-24 h-24 text-blue-500/10 -rotate-12"
                  />
                  <h3 className="text-lg font-black text-white uppercase italic mb-2 relative z-10">
                    {t('northAmericaTravelEssentials')}
                  </h3>
                  <p className="text-sm text-slate-400 relative z-10">
                    {t('travelEssentialsDesc')}
                  </p>
                </div>

                {[
                  {
                    countryKey: "unitedStates",
                    emoji: "🇺🇸",
                    requirements: [
                      { title: "usaEstaTitle", desc: "usaEstaDesc", resource: "officialWebsite", link: "https://www.cbp.gov/" },
                      { title: "usaVisaTitle", desc: "usaVisaDesc", resource: "stateDeptPortal", link: "https://www.state.gov/" },
                      { title: "usaProcessingTitle", desc: "usaProcessingDesc" },
                      { title: "usaCurrencyTitle", desc: "usaCurrencyDesc" }
                    ]
                  },
                  {
                    countryKey: "canada",
                    emoji: "🇨🇦",
                    requirements: [
                      { title: "canadaEtaTitle", desc: "canadaEtaDesc", resource: "canadaCa", link: "https://www.canada.ca/" },
                      { title: "canadaVisaTitle", desc: "canadaVisaDesc", resource: "irccWebsite", link: "https://www.canada.ca/en/immigration-refugees-citizenship.html" },
                      { title: "canadaCostTitle", desc: "canadaCostDesc" },
                      { title: "canadaNoteTitle", desc: "canadaNoteDesc" }
                    ]
                  },
                  {
                    countryKey: "mexico",
                    emoji: "🇲🇽",
                    requirements: [
                      { title: "mexicoFmmTitle", desc: "mexicoFmmDesc", resource: "inmPortal", link: "https://www.inm.gob.mx/spublic/portal/inmex.html" },
                      { title: "mexicoVisaPolicyTitle", desc: "mexicoVisaPolicyDesc", resource: "sreWebsite", link: "https://www.gob.mx/sre/en" },
                      { title: "mexicoValidityTitle", desc: "mexicoValidityDesc" },
                      { title: "mexicoCurrencyTitle", desc: "mexicoCurrencyDesc" }
                    ]
                  }
                ].map((country, idx) => (
                  <div key={idx} className="bg-[#11141B] rounded-2xl border border-white/5 overflow-hidden">
                    <div className="bg-gradient-to-r from-blue-600/20 to-transparent p-6 border-b border-white/5">
                      <h3 className="text-2xl font-black text-white italic uppercase">
                        {country.emoji} {t(country.countryKey)}
                      </h3>
                    </div>
                    <div className="p-6 space-y-4">
                      {country.requirements.map((req, ridx) => (
                        <div key={ridx} className="flex gap-4">
                          <div className="flex-shrink-0 pt-1">
                            <div className="w-2 h-2 bg-blue-500 rounded-full mt-2"></div>
                          </div>
                          <div className="flex-1">
                            <h4 className="font-black text-white uppercase italic text-sm mb-1">
                              {t(req.title)}
                            </h4>
                            <p className="text-slate-400 text-sm italic mb-2">
                              {t(req.desc)}
                            </p>
                            {req.resource && (
                              req.link ? (
                                <a
                                  href={req.link}
                                  target="_blank"
                                  rel="noopener noreferrer"
                                  className="text-blue-400 text-xs font-semibold hover:underline flex items-center gap-1"
                                >
                                  📌 {t(req.resource)} <Icon name="external-link" className="w-3 h-3" />
                                </a>
                              ) : (
                                <p className="text-blue-400 text-xs font-semibold">
                                  📌 {t(req.resource)}
                                </p>
                              )
                            )}
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                ))}

                <div className="bg-amber-600/10 border border-amber-500/20 rounded-2xl p-6">
                  <h3 className="text-lg font-black text-white uppercase italic mb-4 flex items-center gap-2">
                    <Icon name="info" className="w-5 h-5" />
                    {t('generalTravelTips')}
                  </h3>
                  <div className="space-y-3 text-slate-400 italic text-sm">
                    <p>✈️ {t('travelInsurance')}</p>
                    <p>📱 {t('connectivity')}</p>
                    <p>💳 {t('tippingCulture')}</p>
                    <p>🔌 {t('powerOutlets')}</p>
                  </div>
                </div>
              </div>
            )}

            {view === "partners" && (
              <div className="max-w-2xl mx-auto space-y-8 pt-12 px-4">
                <h2 className="text-3xl font-black text-white italic uppercase text-center">
                  {t('partners')}
                </h2>


                <p className="text-center text-slate-400 text-sm italic mt-2">
                  {t('partnersStrapline')}
                </p>
                {/* Large Partner Category Cards - With Sub-Menus */}
                <div className="grid grid-cols-3 gap-3">
                  {[
                    {
                      key: 'tours',
                      icon: 'map',
                      labelKey: 'navTours',
                      color: 'from-emerald-600 to-emerald-800',
                      partners: [
                        { name: 'Klook', url: 'https://tp.media/r?marker=705726&trs=501515&p=4110&u=https%3A%2F%2Fklook.com&campaign_id=137' },
                        { name: 'Viator', url: 'https://vi.me/FXnXh' },
                        { name: 'GetYourGuide', url: 'https://www.getyourguide.com/?partner_id=GNWZENH' },
                        { name: 'CityPASS', url: 'https://www.dpbolvw.net/click-101679782-10855905' }
                      ]
                    },
                    {
                      key: 'insurance',
                      icon: 'shield',
                      labelKey: 'navInsurance',
                      color: 'from-amber-600 to-amber-800',
                      partners: [
                        { name: 'World Nomads', url: 'https://www.kqzyfj.com/click-101679782-15798916' },
                        { name: 'Visitors Coverage', url: 'https://visitorscoverageinc.pxf.io/VOmKkJ' }
                      ]
                    },
                    {
                      key: 'esims',
                      icon: 'wifi',
                      labelKey: 'navESIMs',
                      color: 'from-purple-600 to-purple-800',
                      partners: [
                        { name: 'Airalo', url: 'https://tp.media/r?marker=705726&trs=501515&p=8310&u=https%3A%2F%2Fairalo.com&campaign_id=541' }
                      ]
                    },
                    {
                      key: 'flights',
                      icon: 'plane',
                      labelKey: 'navFlights',
                      color: 'from-sky-600 to-sky-800',
                      partners: [
                        { name: 'Expedia USA', url: 'https://expedia.com/affiliates/expedia-home.PJXbfAV' },
                        { name: 'Expedia Canada', url: 'https://expedia.com/affiliates/expedia-home.ctkxhQB' },
                        { name: 'Expedia Mexico', url: 'https://expedia.com/affiliates/expedia-home.eyObN0B' }
                      ]
                    },
                    {
                      key: 'hotels',
                      icon: 'building',
                      labelKey: 'navHotels',
                      color: 'from-rose-600 to-rose-800',
                      partners: [
                        { name: 'Expedia USA', url: 'https://expedia.com/affiliates/expedia-home.PJXbfAV' },
                        { name: 'Expedia Canada', url: 'https://expedia.com/affiliates/expedia-home.ctkxhQB' },
                        { name: 'Expedia Mexico', url: 'https://expedia.com/affiliates/expedia-home.eyObN0B' }
                      ]
                    },
                    {
                      key: 'transport',
                      icon: 'car',
                      labelKey: 'navTransport',
                      color: 'from-orange-600 to-orange-800',
                      partners: [
                        { name: 'KiwiTaxi', url: 'https://tp.media/r?marker=705726&trs=501515&p=647&u=https%3A%2F%2Fkiwitaxi.com&campaign_id=1' },
                        { name: 'EconomyBookings', url: 'https://economybookings.tpk.mx/xJI3fKyq' },
                        { name: 'QEEQ', url: 'https://qeeq.tpk.mx/TxtqsNS8' }
                      ]
                    }
                  ].map((item) => (
                    <div key={item.key} className="relative">
                      <button
                        onClick={() => setExpandedCategory(expandedCategory === item.key ? null : item.key)}
                        className={`w-full flex flex-col items-center gap-2 p-4 bg-gradient-to-br ${item.color} rounded-2xl border border-white/10 hover:border-white/30 transition-all active:scale-95 ${expandedCategory === item.key ? 'ring-2 ring-white/50' : ''}`}
                      >
                        <Icon name={item.icon} className="w-6 h-6 text-white" />
                        <span className="text-[10px] font-bold text-white uppercase text-center leading-tight">
                          {t(item.labelKey)}
                        </span>
                        <span className="text-[8px] text-white/70">
                          {item.partners.length} options
                        </span>
                      </button>

                      {/* Sub-menu */}
                      {expandedCategory === item.key && (
                        <div className="absolute top-full left-0 right-0 mt-2 bg-[#1a1d26] rounded-xl border border-white/10 shadow-2xl z-50 overflow-hidden">
                          {item.partners.map((partner, idx) => (
                            <a
                              key={idx}
                              href={partner.url}
                              target="_blank"
                              rel="noopener noreferrer"
                              className="flex items-center justify-between px-4 py-3 text-sm text-white hover:bg-white/10 border-b border-white/5 last:border-0 transition-colors"
                            >
                              <span>{partner.name}</span>
                              <Icon name="external-link" className="w-3 h-3 text-slate-400" />
                            </a>
                          ))}
                        </div>
                      )}
                    </div>
                  ))}
                </div>







                {PARTNERS.map((partner, index) => {
                  // Determine category for grouping
                  let categoryId = '';
                  if (partner.titleKey === 'klookTitle' || partner.titleKey === 'viatorTitle' || partner.titleKey === 'getYourGuideTitle' || partner.titleKey === 'citypassTitle') categoryId = 'tours';
                  if (partner.titleKey === 'worldNomadsTitle' || partner.titleKey === 'visitorsCoverageTitle') categoryId = 'insurance';
                  if (partner.titleKey === 'airaloTitle') categoryId = 'esims';
                  if (partner.titleKey === 'expediaTitle') categoryId = 'flights-hotels';
                  if (partner.titleKey === 'kiwitaxiTitle' || partner.titleKey === 'economyBookingsTitle' || partner.titleKey === 'qeeqTitle') categoryId = 'transport';
                  return (
                    <div
                      key={index}
                      data-category={categoryId}
                      data-partner-index={index}

                      className={`rounded-3xl p-6 space-y-5 border transition-all duration-300 scroll-mt-32
${partner.special
                          ? "bg-gradient-to-br from-emerald-700/40 to-blue-900/40 border-emerald-400/30"
                          : "bg-[#11141B] border-white/5 hover:border-blue-500/30 hover:shadow-lg hover:shadow-blue-500/10"
                        }`}

                    >

                      <div>
                        <h3 className="text-xl font-black text-white uppercase italic">
                          {t(partner.titleKey)}
                        </h3>
                        <p className="text-slate-400 text-sm italic mt-2">
                          {t(partner.descKey)}
                        </p>
                      </div>

                      <div className="space-y-3 pt-2 border-t border-white/5">
                        <p className="text-[10px] uppercase tracking-widest text-slate-500 font-bold">
                          {t('availableRegions')}
                        </p>
                        {partner.links.map((link, idx) => (
                          <a
                            key={idx}
                            href={link.url}
                            target="_blank"
                            rel="noopener noreferrer"
                            className="flex justify-between items-center bg-black/30 hover:bg-blue-600/20 border border-white/5 hover:border-blue-500/40 rounded-xl px-4 py-3 text-sm font-semibold text-white transition-all duration-300"
                          >
                            <span className="flex items-center gap-2">
                              🌍 {t(link.labelKey)}
                            </span>
                            <Icon name="external-link" className="w-4 h-4" />
                          </a>
                        ))}

                        {
                          partner.special && (
                            <p className="text-[11px] text-slate-500 italic pt-2 leading-snug">
                              {t('worldNomadsNotice')}
                            </p>
                          )
                        }
                      </div>
                    </div>
                  );
                })}


                <p className="text-xs text-slate-500 mt-6 italic text-center">
                  {t('affiliateDisclaimer')}
                </p>
              </div>
            )}
              // partner edit

            {view === "privacy" && <LegalView type="Privacy" />}
            {view === "disclaimer" && <LegalView type="Disclaimer" />}
            {view === "schedules" && <SchedulesView />}

            {view === "about" && (
              <div className="max-w-2xl mx-auto space-y-6 px-4 sm:px-0 pt-12">
                <h2 className="text-4xl font-black text-white italic uppercase tracking-tight animate-fade-in-down">
                  {t('about')}
                </h2>
                <div className="bg-dark p-6 sm:p-8 rounded-[2.5rem] border border-white/5
                    text-slate-300 leading-relaxed italic space-y-4
                    transform transition duration-700 ease-out
                    opacity-0 scale-95
                    animate-about-container">
                  <p>
                    {t('aboutDesc')}
                  </p>
                </div>
              </div>
            )}
          </main>

          {view !== "register" && <Nav />}
        </div>
      );
    }

    function Root() {
      return (
        <LanguageProvider>
          <App />
        </LanguageProvider>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<Root />);
  </script>
</body>

</html>
