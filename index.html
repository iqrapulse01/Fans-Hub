    const LanguageContext = createContext();

    const LanguageProvider = ({ children }) => {
      const [language, setLanguage] = useState(() => {
        const saved = localStorage.getItem('fansHub2026Language');
        return saved || 'en';
      });

      useEffect(() => {
        localStorage.setItem('fansHub2026Language', language);
      }, [language]);

      const t = (key) => {
        return translations[language]?.[key] || translations['en'][key] || key;
      };

      return (
        <LanguageContext.Provider value={{ language, setLanguage, t }}>
          {children}
        </LanguageContext.Provider>
      );
    };

    const useTranslation = () => {
      const context = useContext(LanguageContext);
      if (!context) {
        throw new Error('useTranslation must be used within LanguageProvider');
      }
      return context;
    };

    const LanguageSelector = () => {
      const { language, setLanguage } = useTranslation();
      const [isOpen, setIsOpen] = useState(false);

      const languages = [
        { code: 'en', name: 'English', flag: '🇬🇧' },
        { code: 'fr', name: 'Français', flag: '🇫🇷' },
        { code: 'de', name: 'Deutsch', flag: '🇩🇪' },

      ];

      const currentLang = languages.find(l => l.code === language);

      const handleLanguageChange = (langCode) => {
        setLanguage(langCode);
        setIsOpen(false);
      };

      return (
        <div className="relative">
          <button
            onClick={() => setIsOpen(!isOpen)}
            className="flex items-center gap-2 px-3 py-2 bg-white/5 hover:bg-white/10 rounded-xl border border-white/10 transition-colors"
          >
            <span className="text-lg">{currentLang?.flag}</span>
            <span className="text-xs font-bold text-white uppercase hidden sm:inline">
              {currentLang?.code}
            </span>
            <Icon name="chevron-down" className="w-3 h-3 text-slate-400" />
          </button>

          {isOpen && (
            <>
              <div
                className="fixed inset-0 z-40"
                onClick={() => setIsOpen(false)}
              />
              <div className="absolute right-0 mt-2 w-48 bg-[#11141B] rounded-xl border border-white/10 shadow-2xl z-50 overflow-hidden">
                {languages.map((lang) => (
                  <button
                    key={lang.code}
                    onClick={() => handleLanguageChange(lang.code)}
                    className={`w-full flex items-center gap-3 px-4 py-3 text-left transition-colors ${language === lang.code
                      ? 'bg-blue-600 text-white'
                      : 'text-slate-300 hover:bg-white/5'
                      }`}
                  >
                    <span className="text-xl">{lang.flag}</span>
                    <span className="text-sm font-semibold">{lang.name}</span>
                    {language === lang.code && (
                      <Icon name="check" className="w-4 h-4 ml-auto" />
                    )}
                  </button>
                ))}
              </div>
            </>
          )}
        </div>
      );

    function useCountdown(targetDate) {
      const [timeLeft, setTimeLeft] = useState({
        days: 0,
        hrs: 0,
        mins: 0,
        secs: 0,
      });

      useEffect(() => {
        const update = () => {
          const now = new Date().getTime();
          const dist = targetDate - now;
          if (dist < 0) return;
          setTimeLeft({
            days: Math.floor(dist / (1000 * 60 * 60 * 24)),
            hrs: Math.floor(
              (dist % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60),
            ),
            mins: Math.floor((dist % (1000 * 60 * 60)) / (1000 * 60)),
            secs: Math.floor((dist % (1000 * 60)) / 1000),
          });
        };
        update();
        const timer = setInterval(update, 1000);
        return () => clearInterval(timer);
      }, [targetDate]);

      return timeLeft;
    }

                      className="w-4 h-4 text-amber-500"
                    />
                    <span className="text-[10px] font-black uppercase tracking-widest text-slate-300">
                      {t('disclaimer')}
                    </span>
                  </button>
                </div>
              </div>
            )}

            {view === "nations" && (
              <div className="max-w-2xl mx-auto space-y-6 pt-12">
                <h2 className="text-3xl font-black text-white italic uppercase">
                  {t('nations')}
                </h2>
                <div className="relative">
                  <Icon
                    name="search"
                    className="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-500"
                  />
                  <input
                    placeholder={t('filterNations')}
                    className="w-full bg-[#11141B] border border-white/5 rounded-2xl py-4 pl-12 pr-4 outline-none text-white focus:border-blue-500/50"
                    value={searchQuery}
                    onChange={(e) => setSearchQuery(e.target.value)}
                  />
                </div>
                <div className="grid gap-4">
                  {filteredNations.map((nation) => (
                    <div
                      key={nation.name}
                      className="bg-[#11141B] p-6 rounded-3xl border border-white/5"
                    >
                      <div className="flex justify-between items-center mb-4">
                        <div className="flex items-center gap-3">
                          <span
                            className={`fi fi-${nation.code} rounded-md w-8 h-6`}
                          />
                          <h3 className="text-xl font-black text-white uppercase italic">
                            {nation.name}
                          </h3>
                        </div>
                        <span
                          className={`px-3 py-1 text-[10px] font-bold rounded-full uppercase ${nation.status === "Qualified" ? "bg-emerald-500/10 text-emerald-500" : "bg-amber-500/10 text-amber-500"}`}
                        >
                          {nation.status === "Qualified" ? t('qualified') : t('playoffs')}
                        </span>
                      </div>
                      <div className="space-y-3">
                        <div className="bg-black/30 p-4 rounded-xl border border-white/5">
                          <div className="flex items-center gap-2 mb-2 text-blue-400">
                            <Icon name="file-text" className="w-4 h-4" />
                            <span className="text-[10px] font-black uppercase tracking-widest">
                              {t('scoutingReport')}
                            </span>
                          </div>
                          <p className="text-sm text-slate-300 italic">
                            "{t(nation.scoutKey)}"
                          </p>
                        </div>
                        <div className="bg-blue-900/10 p-4 rounded-xl border border-blue-500/20">
                          <div className="flex items-center gap-2 mb-2 text-emerald-400">
                            <Icon name="trending-up" className="w-4 h-4" />
                            <span className="text-[10px] font-black uppercase tracking-widest">
                              {t('tournamentOutlook')}
                            </span>
                          </div>
                          <p className="text-sm text-slate-200 font-bold italic">
                            {t('proj')}: {t(nation.outlookKey)}
                          </p>
                        </div>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {view === "venues" && (
              <div className="max-w-2xl mx-auto space-y-6 pt-12">
                <h2 className="text-3xl font-black text-white italic uppercase">
                  {t('venues')}
                </h2>

                {/* Fans Zones Accordion */}
                <div className="bg-gradient-to-r from-blue-600/20 to-purple-600/20 border border-blue-500/30 rounded-2xl overflow-hidden mb-6">
                  <button
                    onClick={() => {
                      const content = document.getElementById('fansZonesContent');
                      const arrow = document.getElementById('fansZonesArrow');
                      if (content && arrow) {
                        if (content.classList.contains('hidden')) {
                          content.classList.remove('hidden');
                          arrow.style.transform = 'rotate(180deg)';
                        } else {
                          content.classList.add('hidden');
                          arrow.style.transform = 'rotate(0deg)';
                        }
                      }
                    }}
                    className="w-full flex items-center justify-between p-4 text-left hover:bg-white/5 transition-colors"
                  >
                    <div className="flex items-center gap-3">
                      <Icon name="users" className="w-5 h-5 text-blue-400" />
                      <span className="text-white font-bold italic uppercase">
                        {t('venues')} <span className="text-blue-400">({t('fansZones')})</span>
                      </span>
                    </div>
                    <div id="fansZonesArrow" className="transition-transform duration-300">
                      <Icon
                        name="chevron-down"
                        className="w-5 h-5 text-slate-400"
                      />
                    </div>
                  </button>

                  <div id="fansZonesContent" className="hidden border-t border-white/10">
                    <div className="p-4 space-y-4">
                      <p className="text-slate-400 text-sm italic">
                        {t('fansZonesDesc')}
                      </p>
                      <div className="grid gap-2">
                        {[
                          'atlantaFZ',
                          'losAngelesFZ',
                          'miamiFZ',
                          'newYorkFZ',
                          'philadelphiaFZ',
                          'torontoFZ',
                          'kansasCityFZ',
                          'mexicoCityFZ',
                          'guadalajaraFZ',
                          'monterreyFZ',
                          'otherCitiesFZ'
                        ].map((key, idx) => (
                          <div
                            key={key}
                            className="flex items-start gap-3 p-3 bg-black/30 rounded-xl border border-white/5"
                          >
                            <span className="text-blue-500 font-black text-lg leading-none mt-0.5">•</span>
                            <span className="text-slate-300 text-sm italic">
                              {t(key)}
                            </span>
                          </div>
                        ))}
                      </div>
                    </div>
                  </div>
                </div>

                {VENUES.map((venue) => (
                  <div
                    key={venue.name}
                    className="bg-[#11141B] rounded-[2.5rem] border border-white/5 overflow-hidden shadow-2xl"
                  >
                    <div className="p-8 bg-gradient-to-br from-blue-600/20 to-transparent border-b border-white/5">
                      <div className="flex justify-between items-start mb-4">
                        <div>
                          <h3 className="text-3xl font-black text-white uppercase italic leading-none mb-2">
                            {venue.name}
                          </h3>
                          <div className="flex items-center gap-2 text-blue-400">
                            <Icon name="map-pin" className="w-4 h-4" />
                            <span className="text-[10px] font-black uppercase tracking-widest">
                              {venue.city}, {venue.country}
                            </span>
                          </div>
                        </div>
                        <div className="bg-white/5 px-4 py-2 rounded-2xl flex items-center gap-2 border border-white/10">
                          <Icon
                            name="users"
                            className="w-4 h-4 text-slate-400"
                          />
                          <span className="text-lg font-black text-white">
                            {venue.capacity}
                          </span>
                        </div>
                      </div>
                      <p className="text-xs text-slate-400 font-mono italic">
                        {venue.address}
                      </p>
                    </div>
                    <div className="p-8 space-y-8">
                      <div className="space-y-4">
                        <div className="flex items-center gap-2 text-amber-500">
                          <Icon name="bus" className="w-5 h-5" />
                          <h4 className="text-xs font-black uppercase tracking-[0.2em]">
                            {t('travel')}:
                          </h4>
                        </div>
                        <div className="bg-black/40 p-5 rounded-2xl border border-white/5 italic text-sm text-slate-300">
                          {t(venue.travelKey)}
                        </div>
                      </div>
                      {venue.touristInfoKey && (
                        <div className="space-y-4">
                          <div className="flex items-center gap-2 text-emerald-500">
                            <Icon name="camera" className="w-5 h-5" />
                            <h4 className="text-xs font-black uppercase tracking-[0.2em]">
                              {t('touristHotspot')}
                            </h4>
                          </div>
                          <div className="bg-emerald-500/5 p-5 rounded-2xl border border-emerald-500/10 italic text-sm text-slate-300">
                            {t(venue.touristInfoKey)}
                          </div>
                        </div>
                      )}
                      <div className="grid grid-cols-2 gap-4">
                        <a
                          href={venue.map}
                          target="_blank"
                          className="flex items-center justify-center gap-3 py-4 bg-blue-600 rounded-2xl text-white font-black uppercase tracking-widest text-[10px]"
                        >
                          <Icon name="navigation" className="w-4 h-4" /> {t('openNavigation')}
                        </a>
                        <a
                          href={venue.office}
                          target="_blank"
                          className="flex items-center justify-center gap-3 py-4 bg-white/5 rounded-2xl text-slate-300 font-black uppercase tracking-widest text-[10px] border border-white/10"
                        >
                          <Icon name="info" className="w-4 h-4" /> {t('cityResources')}
                        </a>
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            )}

            {view === "travelInfo" && (
              <div className="max-w-2xl mx-auto space-y-8 pt-12 pb-4">
                <h2 className="text-3xl font-black text-white italic uppercase">
                  {t('travelInfoTitle')}
                </h2>

                <div className="bg-blue-600/10 border border-blue-500/20 p-6 rounded-3xl relative overflow-hidden">
                  <Icon
                    name="plane"
                    className="absolute -right-4 -bottom-4 w-24 h-24 text-blue-500/10 -rotate-12"
                  />
                  <h3 className="text-lg font-black text-white uppercase italic mb-2 relative z-10">
                    {t('northAmericaTravelEssentials')}
                  </h3>
                  <p className="text-sm text-slate-400 relative z-10">
                    {t('travelEssentialsDesc')}
                  </p>
                </div>

                {[
                  {
                    countryKey: "unitedStates",
                    emoji: "🇺🇸",
                    requirements: [
                      { title: "usaEstaTitle", desc: "usaEstaDesc", resource: "officialWebsite", link: "https://www.cbp.gov/" },
                      { title: "usaVisaTitle", desc: "usaVisaDesc", resource: "stateDeptPortal", link: "https://www.state.gov/" },
                      { title: "usaProcessingTitle", desc: "usaProcessingDesc" },
                      { title: "usaCurrencyTitle", desc: "usaCurrencyDesc" }
                    ]
                  },
                  {
                    countryKey: "canada",
                    emoji: "🇨🇦",
                    requirements: [
                      { title: "canadaEtaTitle", desc: "canadaEtaDesc", resource: "canadaCa", link: "https://www.canada.ca/" },
                      { title: "canadaVisaTitle", desc: "canadaVisaDesc", resource: "irccWebsite", link: "https://www.canada.ca/en/immigration-refugees-citizenship.html" },
                      { title: "canadaCostTitle", desc: "canadaCostDesc" },
                      { title: "canadaNoteTitle", desc: "canadaNoteDesc" }
                    ]
                  },
                  {
                    countryKey: "mexico",
                    emoji: "🇲🇽",
                    requirements: [
                      { title: "mexicoFmmTitle", desc: "mexicoFmmDesc", resource: "inmPortal", link: "https://www.inm.gob.mx/spublic/portal/inmex.html" },
                      { title: "mexicoVisaPolicyTitle", desc: "mexicoVisaPolicyDesc", resource: "sreWebsite", link: "https://www.gob.mx/sre/en" },
                      { title: "mexicoValidityTitle", desc: "mexicoValidityDesc" },
                      { title: "mexicoCurrencyTitle", desc: "mexicoCurrencyDesc" }
                    ]
                  }
                ].map((country, idx) => (
                  <div key={idx} className="bg-[#11141B] rounded-2xl border border-white/5 overflow-hidden">
                    <div className="bg-gradient-to-r from-blue-600/20 to-transparent p-6 border-b border-white/5">
                      <h3 className="text-2xl font-black text-white italic uppercase">
                        {country.emoji} {t(country.countryKey)}
                      </h3>
                    </div>
                    <div className="p-6 space-y-4">
                      {country.requirements.map((req, ridx) => (
                        <div key={ridx} className="flex gap-4">
                          <div className="flex-shrink-0 pt-1">
                            <div className="w-2 h-2 bg-blue-500 rounded-full mt-2"></div>
                          </div>
                          <div className="flex-1">
                            <h4 className="font-black text-white uppercase italic text-sm mb-1">
                              {t(req.title)}
                            </h4>
                            <p className="text-slate-400 text-sm italic mb-2">
                              {t(req.desc)}
                            </p>
                            {req.resource && (
                              req.link ? (
                                <a
                                  href={req.link}
                                  target="_blank"
                                  rel="noopener noreferrer"
                                  className="text-blue-400 text-xs font-semibold hover:underline flex items-center gap-1"
                                >
                                  📌 {t(req.resource)} <Icon name="external-link" className="w-3 h-3" />
                                </a>
                              ) : (
                                <p className="text-blue-400 text-xs font-semibold">
                                  📌 {t(req.resource)}
                                </p>
                              )
                            )}
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                ))}

                <div className="bg-amber-600/10 border border-amber-500/20 rounded-2xl p-6">
                  <h3 className="text-lg font-black text-white uppercase italic mb-4 flex items-center gap-2">
                    <Icon name="info" className="w-5 h-5" />
                    {t('generalTravelTips')}
                  </h3>
                  <div className="space-y-3 text-slate-400 italic text-sm">
                    <p>✈️ {t('travelInsurance')}</p>
                    <p>📱 {t('connectivity')}</p>
                    <p>💳 {t('tippingCulture')}</p>
                    <p>🔌 {t('powerOutlets')}</p>
                  </div>
                </div>
              </div>
            )}

            {view === "partners" && (
              <div className="max-w-2xl mx-auto space-y-8 pt-12 px-4">
                <h2 className="text-3xl font-black text-white italic uppercase text-center">
                  {t('partners')}
                </h2>


                <p className="text-center text-slate-400 text-sm italic mt-2">
                  {t('partnersStrapline')}
                </p>

                {/* Large Partner Category Cards - Partners Page Only */}
                <div className="grid grid-cols-3 gap-3">
                  {[
                    {
                      key: 'tours',
                      icon: 'map',
                      labelKey: 'navTours',
                      color: 'from-emerald-600 to-emerald-800',
                      url: 'https://tp.media/r?marker=705726&trs=501515&p=4110&u=https%3A%2F%2Fklook.com&campaign_id=137' // Klook - main tours partner
                    },
                    {
                      key: 'insurance',
                      icon: 'shield',
                      labelKey: 'navInsurance',
                      color: 'from-amber-600 to-amber-800',
                      url: 'https://www.kqzyfj.com/click-101679782-15798916' // World Nomads
                    },
                    {
                      key: 'esims',
                      icon: 'wifi',
                      labelKey: 'navESIMs',
                      color: 'from-purple-600 to-purple-800',
                      url: 'https://tp.media/r?marker=705726&trs=501515&p=8310&u=https%3A%2F%2Fairalo.com&campaign_id=541' // Airalo
                    },
                    {
                      key: 'flights',
                      icon: 'plane',
                      labelKey: 'navFlights',
                      color: 'from-sky-600 to-sky-800',
                      url: 'https://expedia.com/affiliates/expedia-home.PJXbfAV' // Expedia
                    },
                    {
                      key: 'hotels',
                      icon: 'building',
                      labelKey: 'navHotels',
                      color: 'from-rose-600 to-rose-800',
                      url: 'https://expedia.com/affiliates/expedia-home.PJXbfAV' // Expedia (same as flights)
                    },
                    {
                      key: 'transport',
                      icon: 'car',
                      labelKey: 'navTransport',
                      color: 'from-orange-600 to-orange-800',
                      url: 'https://tp.media/r?marker=705726&trs=501515&p=647&u=https%3A%2F%2Fkiwitaxi.com&campaign_id=1' // KiwiTaxi
                    }
                  ].map((item) => (
                    <a
                      key={item.key}
                      href={item.url}
                      target="_blank"
                      rel="noopener noreferrer"
                      className={`flex flex-col items-center gap-2 p-4 bg-gradient-to-br ${item.color} rounded-2xl border border-white/10 hover:border-white/30 transition-all active:scale-95 cursor-pointer`}
                    >
                      <Icon name={item.icon} className="w-6 h-6 text-white" />
                      <span className="text-[10px] font-bold text-white uppercase text-center leading-tight">
                        {t(item.labelKey)}
                      </span>
                    </a>
                  ))}
                </div>
                {PARTNERS.map((partner, index) => {
                  // Determine category for grouping
                  let categoryId = '';
                  if (partner.titleKey === 'klookTitle' || partner.titleKey === 'viatorTitle' || partner.titleKey === 'getYourGuideTitle' || partner.titleKey === 'citypassTitle') categoryId = 'tours';
                  if (partner.titleKey === 'worldNomadsTitle' || partner.titleKey === 'visitorsCoverageTitle') categoryId = 'insurance';
                  if (partner.titleKey === 'airaloTitle') categoryId = 'esims';
                  if (partner.titleKey === 'expediaTitle') categoryId = 'flights-hotels';
                  if (partner.titleKey === 'kiwitaxiTitle' || partner.titleKey === 'economyBookingsTitle' || partner.titleKey === 'qeeqTitle') categoryId = 'transport';
                  return (
                    <div
                      key={index}
                      data-category={categoryId}
                      data-partner-index={index}

                      className={`rounded-3xl p-6 space-y-5 border transition-all duration-300 scroll-mt-32
${partner.special
                          ? "bg-gradient-to-br from-emerald-700/40 to-blue-900/40 border-emerald-400/30"
                          : "bg-[#11141B] border-white/5 hover:border-blue-500/30 hover:shadow-lg hover:shadow-blue-500/10"
                        }`}

                    >

                      <div>
                        <h3 className="text-xl font-black text-white uppercase italic">
                          {t(partner.titleKey)}
                        </h3>
                        <p className="text-slate-400 text-sm italic mt-2">
                          {t(partner.descKey)}
                        </p>
                      </div>

                      <div className="space-y-3 pt-2 border-t border-white/5">
                        <p className="text-[10px] uppercase tracking-widest text-slate-500 font-bold">
                          {t('availableRegions')}
                        </p>
                        {partner.links.map((link, idx) => (
                          <a
                            key={idx}
                            href={link.url}
                            target="_blank"
                            rel="noopener noreferrer"
                            className="flex justify-between items-center bg-black/30 hover:bg-blue-600/20 border border-white/5 hover:border-blue-500/40 rounded-xl px-4 py-3 text-sm font-semibold text-white transition-all duration-300"
                          >
                            <span className="flex items-center gap-2">
                              🌍 {t(link.labelKey)}
                            </span>
                            <Icon name="external-link" className="w-4 h-4" />
                          </a>
                        ))}

                        {
                          partner.special && (
                            <p className="text-[11px] text-slate-500 italic pt-2 leading-snug">
                              {t('worldNomadsNotice')}
                            </p>
                          )
                        }
                      </div>
                    </div>
                  );
                })}


                <p className="text-xs text-slate-500 mt-6 italic text-center">
                  {t('affiliateDisclaimer')}
                </p>
              </div>
            )}
              // partner edit

            {view === "privacy" && <LegalView type="Privacy" />}
            {view === "disclaimer" && <LegalView type="Disclaimer" />}
            {view === "schedules" && <SchedulesView />}

            {view === "about" && (
              <div className="max-w-2xl mx-auto space-y-6 px-4 sm:px-0 pt-12">
                <h2 className="text-4xl font-black text-white italic uppercase tracking-tight animate-fade-in-down">
                  {t('about')}
                </h2>
                <div className="bg-dark p-6 sm:p-8 rounded-[2.5rem] border border-white/5
                    text-slate-300 leading-relaxed italic space-y-4
                    transform transition duration-700 ease-out
                    opacity-0 scale-95
                    animate-about-container">
                  <p>
                    {t('aboutDesc')}
                  </p>
                </div>
              </div>
            )}
          </main>

          {view !== "register" && <Nav />}
        </div>
      );
    }

    function Root() {
      return (
        <LanguageProvider>
          <App />
        </LanguageProvider>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<Root />);
  </script>
</body>

</html>
